name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    name: Build and publish MSI
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Initialize MSVC build environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.6.3
          arch: win64_msvc2019_64
          modules: qtserialport

      - name: Install WiX Toolset v3
        shell: pwsh
        run: choco install wixtoolset --no-progress --limit-output --yes

      - name: Build MSI
        shell: pwsh
        run: |
          cmake -S . -B build/release -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCOMMUNICATION_ANALYZER_RUN_AFTER_BUILD=OFF `
            "-DQt6_DIR=$env:QT_ROOT_DIR/lib/cmake/Qt6"
          cmake --build build/release --config Release --parallel
          cpack --config build/release/CPackConfig.cmake -G WIX -B artifact
          $installer = Get-Item artifact/CommunicationAnalyzer-x64.msi
          $checksum = (Get-FileHash -LiteralPath $installer.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -LiteralPath "$($installer.FullName).sha256" -Value $checksum -NoNewline
          $releaseVersion = (Select-String -Path build/release/CPackConfig.cmake -Pattern '^set\(CPACK_PACKAGE_VERSION "([0-9]+\.[0-9]+\.[0-9]+)"\)' | Select-Object -First 1).Matches.Groups[1].Value
          if ([string]::IsNullOrWhiteSpace($releaseVersion)) {
            throw 'Unable to determine the release version from CPackConfig.cmake.'
          }
          "RELEASE_VERSION=$releaseVersion" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.RELEASE_VERSION }}
          name: 通讯协议分析仪 v${{ env.RELEASE_VERSION }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            artifact/CommunicationAnalyzer-x64.msi
            artifact/CommunicationAnalyzer-x64.msi.sha256
